<div>
    <h2>Profiles</h2>
    <div id="statai-export-profile-button" class="menu_button menu_button_icon interactable" title="Click to export the current extension settings to your clipboard." data-i18n="[title]Click to export the current extension settings to your clipboard." tabindex="0" role="button" style="">
        <i class="fa-solid fa-fw fa-link"></i>
        <span data-i18n="Export Internal Storage">
            Export Internal Storage
        </span>
    </div>
    <div id="statai-import-profile-button" class="menu_button menu_button_icon interactable" title="Click to import extension settings from your clipboard." data-i18n="[title]Click to import extension settings from your clipboard." tabindex="0" role="button" style="">
        <i class="fa-solid fa-fw fa-link"></i>
        <span data-i18n="Import Internal Storage">
            Import Internal Storage
        </span>
    </div>
    <select id="statai-profile-selection"></select>
    <div class="statai-profile-actions">
        <input type="button" value="Create New Profile" id="statai-create-profile-button" class="menu_button menu_button_icon interactable" title="Create New Profile" tabindex="0" role="button">
        <input type="button" value="Delete Profile" id="statai-delete-profile-button" class="menu_button menu_button_icon interactable" title="Delete Profile" tabindex="0" role="button">
        <input type="button" value="Clear All Profiles" id="statai-clear-profiles-button" class="menu_button menu_button_icon interactable" title="Clear All Profiles" tabindex="0" role="button">
    </div>
    <hr class="sysHR" />
    
    <div class="statai-profile-actions">
        <input type="button" value="Create Stat" id="statai-create-stat-button" class="menu_button menu_button_icon interactable" title="Create New Stat" tabindex="0" role="button">
        <input type="button" value="Delete Stat" id="statai-delete-stat-button" class="menu_button menu_button_icon interactable" title="Delete Stat" tabindex="0" role="button">
        <input type="button" value="Save Stats" id="statai-save-stat-button" class="menu_button menu_button_icon interactable" title="Save Stats" tabindex="0" role="button">
    </div>
    <div id="statai-stat-container">
    </div>
</div>
