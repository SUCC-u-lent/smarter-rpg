<div>
    <h2 id="statai_stat_edit_title">Edit Stat</h2>
    <div>
        <label for="statai_36ake">Stat Name:</label>
        <input type="text" id="statai_36ake" class="statai-input statai_stat_name_input">
        <br/>
        <label for="statai_s148s">Stat Description:</label>
        <textarea id="statai_s148s" class="statai_stat_description_input"></textarea>
        <br/>
        <label for="statai_9l7s">Default Value:</label>
        <input type="text" id="statai_9l7s" class="statai-input statai_stat_default_value_input">
        <br/>
        <label for="statai_5c1e">Type:</label>
        <select id="statai_5c1e" class="statai_stat_type_input">
            <option value="number">Number</option>
            <option value="range">Range</option>
            <option value="percentage">Percentage</option>
            <option value="string">String</option>
        </select>
        <br/>
        <div class="statai_range_inputs">
            <label for="statai_2b8s">Min Range:</label>
            <input type="number" id="statai_2b8s" class="statai-input statai_stat_min_range_input">
            <br/>
            <label for="statai_7d9s">Max Range:</label>
            <input type="number" id="statai_7d9s" class="statai-input statai_stat_max_range_input">
        </div>
        <br/>
        <label for="statai_stat_save" class="menu_button menu_button_icon interactable" tabindex="0" role="button">
            <input id="statai_stat_save" type="button" class="displayNone statai_stat_save_button">
            <i class="fa-solid fa-save"></i>
            <small data-i18n="ext_statai_stat_save">Save Stat</small>
        </label>
    </div>
</div>
