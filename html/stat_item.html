<div class="statai-stat-row">
    <label>Stat Name: </label><input id="statai-stat-name-input" type="text" style="background-color:black;color:white;" class="statai-input statai-stat-name" value="Stat Name"/><br/>
    <label>Stat Type: </label>
    <select class="statai-stat-mode" style="background-color:black;color:white;">
        <option value="number">Number</option>
        <option value="range">Range</option>
    </select><br/>
    <label>Stat Default: </label><input type="number" style="background-color:black;color:white;" class="statai-input statai-stat-default" value="0"/><br/>
    <div class="statai-range-fields" style="display:none;">
        <label>Min: </label><input type="number" style="background-color:black;color:white;" class="statai-input statai-stat-min" value="0"/><br/>
        <label>Max: </label><input type="number" style="background-color:black;color:white;" class="statai-input statai-stat-max" value="1"/><br/>
    </div>
    <label>Stat Description: </label>
    <textarea id="statai-stat-desc" class="statai-input mdHotkeys" data-macros="" placeholder="Describe the stat in a brief one sentence term. For range stats specify the meaning of the minimum and maximum values. E.g 'Physical health; 0 means incapacitated' in the example the maximum is not stated because its implicitly implied in most AI training data" name="description"></textarea>
    <br/>
</div>
