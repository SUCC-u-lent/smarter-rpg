<div class="example-extension-settings">
    <div class="inline-drawer">

        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Connectivity</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>

        <div class="inline-drawer-content">
            <input type="checkbox" id="statai_enable" />
            <label for="statai_enable">Enable Smarter RPG</label>
            <hr class="sysHR" />
            <div class="alignitemscenter flex-container flexFlowColumn flexBasis48p flexGrow flexShrink gap0">
                <small>
                    <span data-i18n="Font Scale">Font Scale</span>
                    <div class="fa-solid fa-circle-info opacity50p" data-i18n="[title]Font size" title="Font size"></div>
                </small>
                <input class="neo-range-slider" type="range" id="statai_font_size" name="statai_font_size" min="1" max="2" step="0.01">
                <input class="neo-range-input" type="number" min="1" max="2" step="0.01" data-for="statai_font_size" id="statai_font_size_counter">
            </div>
            <hr class="sysHR" />
            <label for="statai_connection_url" id="statai_connection_status" class="statai-invalid-text-color">Not Connected To Auxil</label><br/>
            <label for="statai_connection_url">Connection Url:</label>
            <input type="text" id="statai_connection_url" class="statai-input dynasize" data-extra-size="10" />
            <input type="button" id="statai_reset_connection_url" class="statai-input dynasize" data-extra-size="10" value="Reset" />
            <input type="button" id="statai_retry_connection_url" class="statai-input dynasize" data-extra-size="10" value="Retry" />
            <hr class="sysHR" />
            <label for="statai_model">Model:</label>
            <input type="text" id="statai_model" class="statai-input dynasize" data-extra-size="10" />
            <input type="button" id="statai_reset_model" class="statai-input dynasize" data-extra-size="10" value="Reset" />
            <hr class="sysHR">
            <input type="button" id="statai_clear_cache" class="statai-input dynasize" data-extra-size="10" value="Clear Cache" />
        </div>
    </div>
</div>
