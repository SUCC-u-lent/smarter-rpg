<div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <h3 class="margin0" id="statai_profile_header">Example Profile</h3>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <div class="statai-action-row">
            <div id="statai-create-stat" class="menu_button menu_button_icon interactable" tabindex="0" role="button">
                <i class="fa-solid fa-pen-to-square"></i>
                <small data-i18n="ext_regex_new_global_script">+ Stat</small>
            </div>
            <div id="statai-save-profile" class="menu_button menu_button_icon interactable" tabindex="0" role="button">
                <i class="fa-solid fa-save"></i>
                <small data-i18n="ext_regex_new_global_script">Save Profile</small>
            </div>
            <div id="statai-clear-stats" class="menu_button menu_button_icon interactable" tabindex="0" role="button">
                <i class="fa-solid fa-skull"></i>
                <small data-i18n="ext_regex_new_global_script">Clear Stats</small>
            </div>
            <div id="statai-delete-profile" class="menu_button menu_button_icon interactable" tabindex="0" role="button">
                <i class="fa-solid fa-skull"></i>
                <small data-i18n="ext_regex_new_global_script">- Profile</small>
            </div>
        </div>
        <hr class="sysHR" />
        <div hidden id="statai_stat_template">
            <span class="margin0" id="statai_stat_header">Example Stat</span>
            <div class="statai-action-row">
                <div class="menu_button menu_button_icon interactable" id="statai-edit-stat" tabindex="0" role="button">
                    <i class="fa-solid fa-pen-to-square"></i>
                    <small data-i18n="ext_regex_new_global_script">Edit Stat</small>
                </div>
                <div class="menu_button menu_button_icon interactable" id="statai-delete-stat" tabindex="0" role="button">
                    <i class="fa-solid fa-skull"></i>
                    <small data-i18n="ext_regex_new_global_script">Delete Stat</small>
                </div>
            </div>
        </div>
        <div id="statai-stats-container" class="margin0 flex1">

        </div>
    </div>
</div>
