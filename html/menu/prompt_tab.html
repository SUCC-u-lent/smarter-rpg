<div class="example-extension-settings">
    <div class="inline-drawer">

        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Prompts</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>

        <div class="inline-drawer-content">
            <label for="statai_prompt_mode">Prompt Mode:</label>
            <select id="statai_prompt_mode" class="statai-input dynasize" data-extra-size="10">
                <option value="default" title="Auxil's model will be constrained to the stats of the currently selected profile" selected>Normal</option>
                <option value="chaos" title="Auxil's model will be allowed to use any stat from any character, same as one character having all currently selected profiles selected themselves.">Chaos</option>
                <option value="wild" title="Auxil's model will be allowed to create new stats for characters.">Wild</option>
            </select>
            <hr class="sysHR" />
            <label class="statai_default_colors interactable" id="statai_injection_prompt">Injection Prompt:</label><br/>
            <label class="statai_default_colors interactable" for="statai_injection_prompt" id ="statai_injection_prompt_macrolist" hidden>
                Macros:<br/>
                {{all_stats}} - All stats eligable to the chats characters, formatted as [Stat Name]: [Stat Value]<br/>
                {{all_stat_descriptions}} - All stats eligable to the chats characters descriptions, formatted as [Stat Name]: [Stat Description]
            </label>
            <hr class="sysHR">
            <textarea id="statai_injection_prompt_input" class="statai-input fullwidth" placeholder="Enter Injection prompt"></textarea><input type="button" id="statai_reset_injection_prompt" class="statai-input dynasize" data-extra-size="10" value="Reset" />
            <hr class="sysHR">
            <label class="statai_default_colors interactable" id="statai_auxil_prompt">Auxil Prompt:</label><br/>
            <label class="statai_default_colors interactable" for="statai_auxil_prompt" id ="statai_auxil_prompt_macrolist" hidden>
                Macros:<br/>
                {{history}} - The 5 most recent messages in the chat, formatted as [Speaker Name]: [Message Content]<br/>
                {{message}} - The current message being processed, formatted as [Speaker Name]: [Message Content]<br/>
                {{all_stats}} - All stats eligable to the chats characters, formatted as [Stat Name]: [Stat Value]<br/>
                {{all_stat_descriptions}} - All stats eligable to the chats characters descriptions, formatted as [Stat Name]: [Stat Description]
            </label>
            <hr class="sysHR">
            <textarea id="statai_auxil_prompt_input" class="statai-input fullwidth" placeholder="Enter Message prompt"></textarea><input type="button" id="statai_reset_auxil_prompt" class="statai-input dynasize" data-extra-size="10" value="Reset" />
        </div>
    </div>
</div>
