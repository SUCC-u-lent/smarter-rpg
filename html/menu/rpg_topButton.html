<div id="statai-settings-button" class="drawer">
    <div class="drawer-toggle">
        <div
            class="drawer-icon fa-solid fa-cubes fa-fw interactable closedIcon"
            title="Configure the Smarter RPG Extension"
            data-i18n="[title]Configure the Smarter RPG Extension"
            tabindex="0"
            role="button"
        ></div> <!--openIcon-->
    </div>

    <div id="statai_extension_block" class="drawer-content closedDrawer"> <!--openDrawer-->
        <div class="extensions_block flex-container">
            <div class="alignitemscenter flex-container wide100p">
                <h3 class="margin0 flex1" data-i18n="Smarter RPG Extension">Smarter RPG Extension</h3>
                <p>Yes this goliath of an extension needs its own tab, putting it in one tab in the extensions tab got too chaotic.</p>
            </div>
            <div id="statai_extensions_settings" class="flex1 wide50p"></div>
            <div id="statai_extensions_settings2" class="flex1 wide50p"></div>
            <div id="statai_extensions_settings3" class="alignitemsflexstart flex-container wide100p"></div>
        </div>
    </div>
</div>
